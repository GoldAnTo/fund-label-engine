name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: python -m pytest -q

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Smoke test (seed sample DB + run batch + curl endpoints)
        run: |
          python scripts/seed_sample_db.py /tmp/smoke.sqlite
          python -m app.batch --db /tmp/smoke.sqlite
          # 验证关键 API 至少能拉起
          python - <<'PY'
          from fastapi.testclient import TestClient
          from app.main import create_app
          c = TestClient(create_app(db_path="/tmp/smoke.sqlite"))
          assert c.get("/health").status_code == 200
          runs = c.get("/v1/runs").json()["runs"]
          assert runs, "expected at least one run"
          run_id = runs[0]["run_id"]
          assert c.get(f"/v1/runs/{run_id}/summary").status_code == 200
          assert c.get(f"/v1/runs/{run_id}/export?format=csv").status_code == 200
          assert c.get(f"/v1/runs/{run_id}/export?format=xlsx").status_code == 200
          print("smoke OK", run_id)
          PY
