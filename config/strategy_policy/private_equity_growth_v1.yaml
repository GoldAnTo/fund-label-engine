# ============================================================
# Strategy Policy 样例 · 私募主观权益成长型 v1 (version 2)
# ============================================================
# 在 v0 (version 1) 基础上新增 candidate_priority 配置和显式估值阈值。
# 这是阶段 0 的业务样例，不是公司正式投资制度。

policy_id: private_equity_growth
version: 2
policy_status: example
approved_for_production: false

business_mode: private_strategy
strategy_name: 私募主观权益成长型
strategy_type: equity_long_only
market_scope:
  - cn_a
investment_horizon: P12M
benchmark: CSI300
target_return: null
risk_budget: null
maximum_drawdown: null
leverage_limit: 1.0
liquidity_limit: null

position_limit:
  single_stock: null
  single_industry: null
  single_theme: null
  gross_exposure: 1.0
  net_exposure: 1.0

allowed_universe:
  asset_types:
    - stock
    - industry
    - fund
    - strategy
  market_scope:
    - cn_a

excluded_universe:
  - reason: 暂无生产黑名单，仅用于演示政策结构
    assets: []

investment_policy:
  preferred_styles:
    - quality_growth
    - innovation
  required_evidence:
    - business_logic
    - earnings_or_cashflow
    - valuation
    - catalyst_or_expectation_gap
  required_invalidation_conditions: true
  no_candidate_if_evidence_insufficient: true

valuation_policy:
  status: example
  method: relative_and_absolute
  max_pe: 60
  max_pb: 10
  max_peg: 2.0
  max_valuation_percentile: 85
  require_historical_percentile: true

candidate_priority:
  method_version: fund_priority_v0
  source_method_version: fund_candidate_evidence_v0
  asset_type: fund
  minimum_target_holding_weight: 0.03
  minimum_disclosed_holding_weight: 0.10
  minimum_factor_coverage_weight: 0.50
  maximum_holding_age_days: 180
  valuation_breach_mode: watch
  require_manager_identity: true
  require_holding_report_date: true
  required_evidence:
    - business_logic
    - earnings_or_cashflow
    - valuation
    - catalyst_or_expectation_gap
  allowed_asset_types:
    - fund
  excluded_asset_codes: []
  approved_for_production: false

fund_recommendation:
  method_version: fund_recommendation_v1
  source_method_version: fund_candidate_evidence_v0
  minimum_target_holding_weight: 0.10
  maximum_holding_age_days: 180
  active_fund_limit: 3
  etf_or_index_limit: 3
  alternative_limit: 2
  weights:
    theme_exposure: 0.55
    thesis_alignment: 0.15
    risk_return: 0.15
    fund_quality: 0.15

monitoring_policy:
  holding_change:
    enabled: true
    threshold: 0.05          # 单持仓漂移 > 5pp 触发 warning
    owner: "基金经理"
    review_sla_hours: 48
  industry_drift:
    enabled: true
    threshold: 0.10          # 行业偏离基准 > 10pp 触发 warning
    owner: "研究员"
    review_sla_hours: 72
  style_drift:
    enabled: true
    threshold: 0.15          # 风格偏离政策 > 15pp 触发 warning
    owner: "风控"
    review_sla_hours: 48
  manager_change:
    enabled: true
    trigger: "any"           # 任何基金经理变更触发 critical
    owner: "投决会"
    review_sla_hours: 24
  data_stale:
    enabled: true
    days_threshold: 60       # 数据 60 天未更新触发 warning
    owner: "数据团队"
    review_sla_hours: 24
  thesis_invalidation:
    enabled: true
    review_days: 180         # 假设 180 天未复核触发 watching
    owner: "投研负责人"
    review_sla_hours: 168
  risk_breach:
    enabled: true
    drawdown: 0.15           # 回撤 > 15% 触发 critical
    volatility: 0.35         # 波动率 > 35% 触发 warning
    owner: "风控"
    review_sla_hours: 4

effective_from: 2026-07-10
effective_to: null
approved_by: null
schema_doc: docs/p0/domain-language-v0.md
change_policy: append_new_version
