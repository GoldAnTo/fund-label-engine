# 认知产业链图谱
#
# 每个方向包含：
# 1. judgment: 判断模板（认知层次 -> 估值容忍度 -> 仓位角色）
# 2. chain: 产业链环节（每环有股票、确定性、弹性、受益逻辑）
# 3. defense: 对冲方向
#
# 系统根据图谱自动完成5步推导，不需要投资人做选择。

AI:
  judgment:
    level: "productivity"          # 生产力变革 -> 高估值容忍度
    belief: "AI是巨大生产力变革"
    time_horizon: "long"           # 长期(5年+)
    valuation_tolerance: "high"    # PEG是关键指标，不是绝对PE
    key_metric: "peg"              # 核心估值指标
    hard_limits:
      max_valuation_percentile: 95 # 即使再相信，不在历史最高位追
      max_peg: 2.0                 # PEG超过2不考虑
    portfolio_role: "core"         # 核心仓位
    role_weight_range: [15, 25]    # 核心仓位15-25%

  chain:
    - name: "芯片设计"
      stocks: ["寒武纪", "海光信息", "澜起科技"]
      certainty: "medium"          # 确定性：中（国产替代逻辑，但竞争激烈）
      elasticity: "high"           # 利润弹性：高（毛利率高，增量收入大部分变利润）
      benefit_logic: "AI芯片需求增长，国产替代加速"
      industry_keywords: ["半导体", "芯片设计"]

    - name: "晶圆代工"
      stocks: ["台积电", "中芯国际"]
      certainty: "high"            # 确定性：高（台积电垄断先进制程）
      elasticity: "medium"         # 利润弹性：中（资本密集型，利润率稳定）
      benefit_logic: "所有AI芯片都需要代工，台积电是绝对受益者"
      industry_keywords: ["半导体", "晶圆代工"]

    - name: "封装测试"
      stocks: ["长电科技", "通富微电"]
      certainty: "medium"          # 先进封装受益，但传统封装竞争激烈
      elasticity: "medium"
      benefit_logic: "AI芯片需要先进封装，先进封装产能紧张"
      industry_keywords: ["半导体", "封装"]

    - name: "光模块/连接"
      stocks: ["中际旭创", "天孚通信", "新易盛"]
      certainty: "high"            # AI数据中心直接需求，订单已确认
      elasticity: "high"           # 毛利率较高，利润弹性大
      benefit_logic: "AI数据中心需要大量光模块，800G/1.6T需求爆发"
      industry_keywords: ["光模块", "光通信", "通信设备"]

    - name: "PCB/电子元件"
      stocks: ["沪电股份", "深南电路", "生益科技", "胜宏科技"]
      certainty: "high"            # AI服务器PCB需求确定
      elasticity: "high"           # 高端PCB毛利率提升
      benefit_logic: "AI服务器需要高层数PCB，量价齐升"
      industry_keywords: ["电子元件", "印制电路", "电子设备"]

    - name: "服务器/算力"
      stocks: ["工业富联", "浪潮信息", "紫光股份"]
      certainty: "medium"          # AI服务器渗透率提升，但竞争激烈
      elasticity: "medium"         # 服务器毛利率较低
      benefit_logic: "AI服务器渗透率从5%向30%提升"
      industry_keywords: ["计算机设备", "服务器"]

    - name: "应用层"
      stocks: []
      certainty: "low"             # 大多在亏损，商业化不确定
      elasticity: "very_high"      # 如果成功弹性极大
      benefit_logic: "AI应用商业化，但时间不确定"
      industry_keywords: ["软件", "人工智能"]
      exclude: true                # 默认排除（尚未商业化）

  defense: "dividend_defense"

innovation_drug:
  judgment:
    level: "market"                # 市场错杀 -> 低估值容忍度
    belief: "创新药被市场错杀"
    time_horizon: "mid"            # 中期(1-3年)
    valuation_tolerance: "low"     # 如果是错杀，应该便宜
    key_metric: "pe_vs_median"     # 核心指标：PE vs 行业中位数
    hard_limits:
      max_pe: 40                   # 创新药PE不超过40
      max_valuation_percentile: 60 # 估值分位不超过60%
    portfolio_role: "satellite"    # 卫星仓位
    role_weight_range: [5, 15]

  chain:
    - name: "创新药研发"
      stocks: ["恒瑞医药", "百济神州", "信达生物", "君实生物"]
      certainty: "medium"          # 研发有不确定性
      elasticity: "high"           # 新药上市后利润弹性大
      benefit_logic: "中国创新药BD交易额占全球30%，研发能力被认可"
      industry_keywords: ["化学制药", "生物制品", "医药生物"]

    - name: "CXO服务"
      stocks: ["药明康德", "凯莱英", "康龙化成", "泰格医药"]
      certainty: "high"            # CXO订单制，收入确定性高
      elasticity: "medium"
      benefit_logic: "全球新药研发投入增长，CXO订单充足"
      industry_keywords: ["医疗服务", "医疗研发"]

    - name: "医疗器械"
      stocks: ["迈瑞医疗", "联影医疗"]
      certainty: "high"            # 器械集采影响小于药品
      elasticity: "medium"
      benefit_logic: "医疗设备国产替代，基层医疗扩容"
      industry_keywords: ["医疗器械"]

  defense: "dividend_defense"

consumer:
  judgment:
    level: "structure"             # 结构集中 -> 中估值容忍度
    belief: "消费升级和龙头集中是长期趋势"
    time_horizon: "long"
    valuation_tolerance: "medium"  # 龙头合理估值可以持有
    key_metric: "roe"              # 核心指标：ROE（盈利能力）
    hard_limits:
      max_valuation_percentile: 75
      min_roe: 12                  # ROE低于12%不考虑
    portfolio_role: "base"         # 底仓配置
    role_weight_range: [10, 20]

  chain:
    - name: "食品饮料（白酒）"
      stocks: ["贵州茅台", "五粮液", "泸州老窖", "洋河股份"]
      certainty: "high"            # 白酒龙头确定性高
      elasticity: "low"            # 利润增长稳定但弹性小
      benefit_logic: "高端白酒量价齐升，品牌壁垒深"
      industry_keywords: ["白酒", "食品饮料"]

    - name: "食品饮料（大众品）"
      stocks: ["伊利股份", "海天味业", "安井食品"]
      certainty: "high"
      elasticity: "low"
      benefit_logic: "消费龙头市场份额持续提升"
      industry_keywords: ["乳品", "调味品", "食品"]

    - name: "家电"
      stocks: ["美的集团", "格力电器", "海尔智家"]
      certainty: "high"
      elasticity: "low"
      benefit_logic: "家电龙头全球化+智能化，ROE稳定15%+"
      industry_keywords: ["家电", "白色家电"]

    - name: "免税零售"
      stocks: ["中国中免", "珀莱雅"]
      certainty: "medium"          # 消费恢复有不确定性
      elasticity: "high"           # 消费恢复后弹性大
      benefit_logic: "消费回流+免税渠道扩张"
      industry_keywords: ["零售", "免税", "化妆品"]

  defense: "dividend_defense"

dividend_defense:
  judgment:
    level: "structure"
    belief: "红利低波作为防守仓位"
    time_horizon: "long"
    valuation_tolerance: "low"     # 防守仓位要求低估值
    key_metric: "dividend_yield"   # 核心指标：股息率
    hard_limits:
      max_pe: 15
      min_dividend_yield: 3.0      # 股息率至少3%
    portfolio_role: "defense"      # 防守仓位
    role_weight_range: [10, 15]

  chain:
    - name: "银行保险"
      stocks: ["招商银行", "工商银行", "中国平安", "建设银行", "农业银行", "中国人寿"]
      certainty: "high"
      elasticity: "low"
      benefit_logic: "低估值+高股息+稳定盈利"
      industry_keywords: ["银行", "保险"]

    - name: "能源公用"
      stocks: ["中国神华", "长江电力", "中国海洋石油", "中国石化"]
      certainty: "high"
      elasticity: "low"
      benefit_logic: "资源品垄断+高分红+低估值"
      industry_keywords: ["石油", "煤炭", "电力", "公用", "油气开采"]

    - name: "基建交运"
      stocks: ["中国建筑", "大秦铁路"]
      certainty: "high"
      elasticity: "low"
      benefit_logic: "基建龙头低估值+稳定现金流"
      industry_keywords: ["建筑", "交通"]

# === 投资风格认知（借鉴 AI Hedge Fund 的投资大师Agent）===
# 不同投资风格 = 不同的认知框架，对应不同的筛选标准和估值容忍度

value_investing:
  judgment:
    level: "structure"
    belief: "我相信价值投资：好公司 at 好价格"
    time_horizon: "long"
    valuation_tolerance: "low"      # 价值投资要求低估值
    key_metric: "pe_premium"        # 核心指标：PE溢价（vs同行）
    hard_limits:
      max_pe: 20
      min_roe: 15
      max_valuation_percentile: 40  # 只选估值分位<40%的
    portfolio_role: "core"
    role_weight_range: [20, 40]

  chain:
    - name: "低估值蓝筹"
      stocks: ["招商银行", "中国平安", "格力电器", "万科", "保利发展", "兴业银行", "工商银行", "浦发银行", "海螺水泥", "中国建筑"]
      certainty: "high"
      elasticity: "low"
      benefit_logic: "低PE+高ROE+稳定分红=安全边际"
      industry_keywords: ["银行", "保险", "家电", "房地产", "房地产开发", "水泥", "建筑材料"]

  defense: "dividend_defense"

growth_investing:
  judgment:
    level: "productivity"
    belief: "我相信成长投资：高增速消化高估值"
    time_horizon: "long"
    valuation_tolerance: "high"     # 成长投资容忍高估值
    key_metric: "revenue_growth"    # 核心指标：营收增速
    hard_limits:
      min_growth: 25                # 增速至少25%
      max_valuation_percentile: 90  # 允许估值分位到90%
      max_peg: 2.5                  # PEG允许到2.5
    portfolio_role: "satellite"
    role_weight_range: [10, 25]

  chain:
    - name: "科技成长"
      stocks: ["宁德时代", "比亚迪", "中际旭创", "寒武纪", "隆基绿能", "阳光电源", "特变电工", "中环股份", "赣锋锂业", "通威股份", "晶盛机电"]
      certainty: "medium"
      elasticity: "high"
      benefit_logic: "技术驱动+市场空间大+增速高"
      industry_keywords: ["新能源", "半导体", "通信", "芯片", "光伏", "光伏设备", "电网设备", "能源金属", "锂"]

  defense: "dividend_defense"

contrarian_investing:
  judgment:
    level: "market"
    belief: "我相信逆向投资：被错杀的好公司终将回归"
    time_horizon: "medium"
    valuation_tolerance: "low"
    key_metric: "val_pct"           # 核心指标：估值分位
    hard_limits:
      max_valuation_percentile: 25  # 只选估值分位<25%的（底部区域）
      min_roe: 10                   # ROE至少10%（好公司）
    portfolio_role: "satellite"
    role_weight_range: [5, 15]

  chain:
    - name: "被错杀的地产金融"
      stocks: ["万科", "保利发展", "招商银行", "兴业银行", "中国平安", "工商银行", "浦发银行"]
      certainty: "medium"
      elasticity: "medium"
      benefit_logic: "地产金融被政策恐慌错杀，估值底部+基本面仍在"
      industry_keywords: ["房地产", "银行", "保险"]

    - name: "被错杀的基建建材"
      stocks: ["中国建筑", "海螺水泥"]
      certainty: "medium"
      elasticity: "medium"
      benefit_logic: "基建建材被需求悲观错杀，低估值+现金流稳定"
      industry_keywords: ["建筑", "建材", "水泥"]

  defense: "dividend_defense"
